<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — DentalEd Year 3</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    .auth-form-panel { padding: 32px 40px; }
    @media (max-width: 640px) { .auth-form-panel { padding: 24px 20px; } }
  </style>
</head>
<body class="auth-page">

  <aside class="auth-brand">
    <div class="brand-logo">
      <div class="brand-logo-icon">🦷</div>
      <div class="brand-logo-text">
        DentalEd Platform
        <span>Third Year · Dental Medicine</span>
      </div>
    </div>
    <h1 class="brand-title">Join Your <span>Class</span><br>of 2025</h1>
    <p class="brand-sub">Create your free student account and access all third-year subjects instantly.</p>
    <div class="brand-stats">
      <div class="brand-stat"><div class="brand-stat-num">12</div><div class="brand-stat-label">Subjects</div></div>
      <div class="brand-stat"><div class="brand-stat-num">🔒</div><div class="brand-stat-label">Secure</div></div>
      <div class="brand-stat"><div class="brand-stat-num">Free</div><div class="brand-stat-label">Always</div></div>
    </div>
  </aside>

  <main class="auth-form-panel">
    <div class="auth-form-box">
      <div class="auth-form-header">
        <h1>Create Account</h1>
        <p>Fill in your details — takes less than a minute.</p>
      </div>

      <div id="signupAlert" class="alert" role="alert"></div>

      <form id="signupForm" novalidate>

        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" placeholder="e.g. Ahmed Al-Rashidi" autocomplete="name" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="student_id">Student ID (رقم القيد)</label>
            <input type="text" id="student_id" name="student_id" placeholder="e.g. 2230903634" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. 0911234567" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="university">University</label>
            <input type="text" id="university" name="university" placeholder="e.g. University of Tripoli" required />
          </div>
          <div class="form-group">
            <label for="faculty">Faculty</label>
            <input type="text" id="faculty" name="faculty" placeholder="e.g. Faculty of Dentistry" required />
          </div>
        </div>

        <div class="form-group">
          <label for="academic_year">Academic Year</label>
          <input type="text" id="academic_year" name="academic_year" value="Third Year" readonly />
        </div>

        <div class="form-group">
          <label for="email">Email Address <span style="color:var(--text-muted);font-weight:400">(required for password recovery)</span></label>
          <input type="email" id="email" name="email" placeholder="you@university.edu" autocomplete="email" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Min. 6 chars" autocomplete="new-password" required />
              <button type="button" class="toggle-password" onclick="togglePwd('password',this)">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <div class="input-wrapper">
              <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" autocomplete="new-password" required />
              <button type="button" class="toggle-password" onclick="togglePwd('confirm_password',this)">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="./index.html">Sign in here</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./app.js"></script>
  <script>
    function togglePwd(id, btn) {
      var inp = document.getElementById(id);
      var h = inp.type === 'password';
      inp.type = h ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = h
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
    initSignupPage();
  </script>
</body>
</html>

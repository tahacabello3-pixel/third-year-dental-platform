<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile — DentalEd Year 3</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    #loadingOverlay {
      position:fixed;inset:0;background:#0d0f14;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:9999;transition:opacity .35s ease;
    }
    #loadingOverlay.hidden{opacity:0;pointer-events:none;}
    .loading-tooth{font-size:2.8rem;animation:pulse 1.2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
    .loading-text{font-size:.88rem;color:#4a5068;font-family:'Inter',sans-serif;}
    .loading-bar{width:120px;height:3px;background:#1a1e2a;border-radius:99px;overflow:hidden;}
    .loading-bar-fill{height:100%;width:40%;background:linear-gradient(90deg,#2563eb,#4f8ef7);border-radius:99px;animation:slide 1.2s ease-in-out infinite;}
    @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

    .profile-page-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 36px;
      max-width: 640px;
      margin: 0 auto;
    }
    .profile-page-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .profile-avatar-xl {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dark), var(--teal));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .profile-page-header h2 {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .profile-page-header p { color: var(--text-secondary); font-size: .88rem; }

    .profile-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 580px) { .profile-form-grid { grid-template-columns: 1fr; } }
    .profile-full { grid-column: 1 / -1; }

    .profile-form-group { display: flex; flex-direction: column; gap: 7px; }
    .profile-form-group label {
      font-size: .78rem; font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .profile-form-group input {
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: .95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .profile-form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .profile-form-group input[readonly] {
      background: rgba(255,255,255,.03);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .profile-form-group .field-note {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .btn-save {
      flex: 1;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff; border: none;
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: .95rem; font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-accent);
      transition: all .2s;
    }
    .btn-save:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel {
      padding: 12px 20px;
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: .92rem; font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-cancel:hover { border-color: var(--border-hover); color: var(--text-primary); }

    /* Avatar upload */
    .profile-avatar-xl {
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }
    .profile-avatar-xl img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .avatar-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .profile-avatar-xl:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay svg { color: #fff; }
    .avatar-upload-hint {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: center;
    }
    #avatarInput { display: none; }
    .avatar-uploading { opacity: 0.6; pointer-events: none; }

    /* Password change section */
    .password-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 28px 36px;
      max-width: 640px;
      margin: 20px auto 0;
    }
    .password-section h3 {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
  </style>

  <main class="page-wrapper">

    <!-- Profile edit card -->
    <div class="profile-page-card">
      <div class="profile-page-header">
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div class="profile-avatar-xl" id="profileAvatar" onclick="document.getElementById('avatarInput').click()" title="Change photo">
            <span id="avatarInitial">S</span>
            <div class="avatar-overlay">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
          </div>
          <span class="avatar-upload-hint">Tap to change photo</span>
          <input type="file" id="avatarInput" accept="image/*" />
        </div>
        <div>
          <h2 id="profileNameHeader">Loading…</h2>
          <p>Edit your personal information below.</p>
        </div>
      </div>

      <div id="profileAlert" class="alert" style="margin-bottom:20px"></div>

      <form id="profileForm" novalidate>
        <div class="profile-form-grid">

          <div class="profile-form-group profile-full">
            <label>Full Name</label>
            <input type="text" id="pFullName" placeholder="Your full name" required />
          </div>

          <div class="profile-form-group">
            <label>Student ID (رقم القيد)</label>
            <input type="text" id="pStudentId" placeholder="e.g. 2230903634" required />
          </div>

          <div class="profile-form-group">
            <label>Phone Number</label>
            <input type="tel" id="pPhone" placeholder="e.g. 0911234567" />
          </div>

          <div class="profile-form-group">
            <label>University</label>
            <input type="text" id="pUniversity" placeholder="University name" required />
          </div>

          <div class="profile-form-group">
            <label>Faculty</label>
            <input type="text" id="pFaculty" placeholder="Faculty name" required />
          </div>

          <div class="profile-form-group profile-full">
            <label>Academic Year</label>
            <input type="text" id="pYear" value="Third Year" readonly />
            <span class="field-note">Academic year cannot be changed.</span>
          </div>

          <div class="profile-form-group profile-full">
            <label>Email Address</label>
            <input type="email" id="pEmail" readonly />
            <span class="field-note">Email cannot be changed here for security reasons.</span>
          </div>

        </div>

        <div class="profile-actions">
          <button type="submit" class="btn-save" id="saveBtn">Save Changes</button>
          <a href="./dashboard.html" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>

    <!-- Change password -->
    <div class="password-section">
      <h3>🔐 Change Password</h3>

      <div id="pwdAlert" class="alert" style="margin-bottom:16px"></div>

      <form id="passwordForm" novalidate>
        <div class="profile-form-grid">
          <div class="profile-form-group">
            <label>New Password</label>
            <div class="input-wrapper">
              <input type="password" id="newPwd" placeholder="Min. 6 characters" style="background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text-primary);font-family:var(--font-body);font-size:.95rem;padding:11px 44px 11px 14px;outline:none;width:100%;transition:border-color .2s;" />
              <button type="button" class="toggle-password" onclick="togglePwd('newPwd',this)">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="profile-form-group">
            <label>Confirm New Password</label>
            <div class="input-wrapper">
              <input type="password" id="confirmPwd" placeholder="Repeat new password" style="background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text-primary);font-family:var(--font-body);font-size:.95rem;padding:11px 44px 11px 14px;outline:none;width:100%;transition:border-color .2s;" />
              <button type="button" class="toggle-password" onclick="togglePwd('confirmPwd',this)">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div style="margin-top:16px">
          <button type="submit" class="btn-save" id="pwdBtn" style="max-width:200px">Update Password</button>
        </div>
      </form>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./app.js"></script>
  <script>
    function togglePwd(id, btn) {
      var inp = document.getElementById(id);
      var h = inp.type === 'password';
      inp.type = h ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = h
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    (async function() {
      var session = await requireAuth();
      if (!session) return;

      var user    = session.user;
      var profile = await fetchProfile(user.id);
      var name    = (profile && profile.full_name) ? profile.full_name : user.email;

      // Fill nav
      document.getElementById('navAvatar').textContent = name.charAt(0).toUpperCase();
      document.getElementById('navName').textContent   = name.split(' ')[0];
      document.getElementById('logoutBtn').addEventListener('click', logout);

      // Fill profile avatar
      document.getElementById('avatarInitial').textContent    = name.charAt(0).toUpperCase();
      document.getElementById('profileNameHeader').textContent = name;

      // Load existing avatar photo
      async function loadAvatar() {
        if (profile && profile.avatar_url) {
          var avatarEl = document.getElementById('profileAvatar');
          var img = document.createElement('img');
          img.src = profile.avatar_url + '?t=' + Date.now();
          img.onload = function() {
            document.getElementById('avatarInitial').style.display = 'none';
            avatarEl.insertBefore(img, avatarEl.firstChild);
            // Also update nav
            var navAv = document.getElementById('navAvatar');
            navAv.innerHTML = '<img src="' + img.src + '" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';
            navAv.style.fontSize = '0';
          };
        }
      }
      await loadAvatar();

      // Avatar upload
      document.getElementById('avatarInput').addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 3 * 1024 * 1024) {
          showAlert('profileAlert', '⚠️ Image must be under 3MB.'); return;
        }

        var avatarEl = document.getElementById('profileAvatar');
        avatarEl.classList.add('avatar-uploading');
        showAlert('profileAlert', '⏳ Uploading photo…');

        var ext = file.name.split('.').pop();
        var path = user.id + '/avatar.' + ext;

        var { error: upErr } = await _supabase.storage.from('pfp').upload(path, file, { upsert: true, contentType: file.type });
        if (upErr) {
          avatarEl.classList.remove('avatar-uploading');
          showAlert('profileAlert', '❌ Upload failed: ' + upErr.message); return;
        }

        var { data: urlData } = _supabase.storage.from('pfp').getPublicUrl(path);
        var publicUrl = urlData.publicUrl;

        var { error: dbErr } = await _supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
        avatarEl.classList.remove('avatar-uploading');

        if (dbErr) {
          showAlert('profileAlert', '❌ Could not save photo URL: ' + dbErr.message); return;
        }

        // Show new photo
        var oldImg = avatarEl.querySelector('img');
        if (oldImg) oldImg.remove();
        document.getElementById('avatarInitial').style.display = 'none';
        var newImg = document.createElement('img');
        newImg.src = publicUrl + '?t=' + Date.now();
        avatarEl.insertBefore(newImg, avatarEl.firstChild);

        // Update nav
        var navAv = document.getElementById('navAvatar');
        navAv.innerHTML = '<img src="' + newImg.src + '" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';
        navAv.style.fontSize = '0';

        showAlert('profileAlert', '✅ Photo updated!', 'success');
      });

      // Fill form
      if (profile) {
        document.getElementById('pFullName').value   = profile.full_name   || '';
        document.getElementById('pStudentId').value  = profile.student_id  || '';
        document.getElementById('pPhone').value      = profile.phone       || '';
        document.getElementById('pUniversity').value = profile.university  || '';
        document.getElementById('pFaculty').value    = profile.faculty     || '';
        document.getElementById('pEmail').value      = profile.email       || user.email || '';
      }

      // Hide loading
      var overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('hidden');
      setTimeout(function(){ overlay.remove(); }, 400);

      // ── Save profile ────────────────────────────────────────
      document.getElementById('profileForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideAlert('profileAlert');

        var fullName   = document.getElementById('pFullName').value.trim();
        var studentId  = document.getElementById('pStudentId').value.trim();
        var phone      = document.getElementById('pPhone').value.trim();
        var university = document.getElementById('pUniversity').value.trim();
        var faculty    = document.getElementById('pFaculty').value.trim();
        var btn        = document.getElementById('saveBtn');

        if (!fullName || !studentId || !university || !faculty) {
          showAlert('profileAlert', 'Please fill in all required fields.'); return;
        }

        var restore = setLoading(btn, 'Saving…');

        var r = await _supabase.from('profiles').upsert({
          id:           user.id,
          full_name:    fullName,
          student_id:   studentId,
          phone:        phone || null,
          university:   university,
          faculty:      faculty,
          email:        user.email,
          academic_year: 'Third Year'
        }, { onConflict: 'id' });

        restore();

        if (r.error) {
          console.error('Profile save error:', r.error);
          showAlert('profileAlert', 'Error saving profile: ' + r.error.message);
          return;
        }

        // Verify the update actually saved
        var verify = await _supabase.from('profiles').select('full_name,university,faculty').eq('id', user.id).single();
        if (verify.error || !verify.data || verify.data.university !== university) {
          showAlert('profileAlert', '⚠️ Changes may not have saved. Please check your internet and try again.');
          return;
        }

        // Update nav name
        document.getElementById('navAvatar').textContent        = fullName.charAt(0).toUpperCase();
        document.getElementById('navName').textContent          = fullName.split(' ')[0];
        document.getElementById('avatarInitial').textContent    = fullName.charAt(0).toUpperCase();
        document.getElementById('profileNameHeader').textContent = fullName;

        showAlert('profileAlert', '✅ Profile updated successfully!', 'success');
      });

      // ── Change password ─────────────────────────────────────
      document.getElementById('passwordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideAlert('pwdAlert');

        var newPwd     = document.getElementById('newPwd').value;
        var confirmPwd = document.getElementById('confirmPwd').value;
        var btn        = document.getElementById('pwdBtn');

        if (!newPwd || !confirmPwd) { showAlert('pwdAlert', 'Please fill in both fields.'); return; }
        if (newPwd.length < 6)      { showAlert('pwdAlert', 'Password must be at least 6 characters.'); return; }
        if (newPwd !== confirmPwd)  { showAlert('pwdAlert', 'Passwords do not match.'); return; }

        var restore = setLoading(btn, 'Updating…');
        var r = await _supabase.auth.updateUser({ password: newPwd });
        restore();

        if (r.error) { showAlert('pwdAlert', 'Error: ' + r.error.message); return; }
        showAlert('pwdAlert', '✅ Password updated successfully!', 'success');
        document.getElementById('passwordForm').reset();
      });

    })();
  </script>
